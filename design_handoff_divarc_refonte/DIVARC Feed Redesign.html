<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>DIVARC — Refonte Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #efece4; font-family: Geist, system-ui, sans-serif; color: #0A1F44; }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(10,31,68,0.25); border-radius: 4px; }

  /* ────────────── DIVARC TWEAKS ────────────── */
  /* All rules scoped to [data-divarc] = the canvas root. We override the
     inline-styled colors shipped by the feed components using attribute
     selectors. !important is required to beat element-level inline styles. */

  /* Gold intensity — exposed as CSS var that some accents already consume,
     and used by the override block below. */
  [data-divarc] { --dvc-gold: #F4B942; --dvc-gold-deep: #B88A2A; --dvc-gold-soft: #FFF8E8; }
  [data-divarc][data-gold="discret"] { --dvc-gold: #C9A45A; --dvc-gold-deep: #8C6818; --dvc-gold-soft: #FBF6E8; }
  [data-divarc][data-gold="poussé"]  { --dvc-gold: #FFC859; --dvc-gold-deep: #A87515; --dvc-gold-soft: #FFEDB8; }

  /* Italic display toggle: when off, swap Instrument Serif headings to Geist. */
  [data-divarc][data-italic="off"] [style*="Instrument Serif"] {
    font-family: Geist, system-ui, sans-serif !important;
    font-style: normal !important;
    letter-spacing: -0.025em !important;
    font-weight: 700 !important;
  }
  [data-divarc][data-italic="off"] em[style*="italic"] {
    font-style: normal !important;
  }

  /* Card style — affects white card surfaces. */
  [data-divarc][data-cards="flat"] [style*="background: rgb(255, 255, 255)"],
  [data-divarc][data-cards="flat"] [style*="background:#fff"] {
    box-shadow: none !important;
    border: none !important;
  }
  [data-divarc][data-cards="bordered"] [style*="background: rgb(255, 255, 255)"],
  [data-divarc][data-cards="bordered"] [style*="background:#fff"] {
    box-shadow: none !important;
    border: 1.5px solid rgba(10,31,68,0.18) !important;
  }
  [data-divarc][data-cards="elevated"] article[style*="background: rgb(255, 255, 255)"],
  [data-divarc][data-cards="elevated"] article[style*="background:#fff"] {
    box-shadow: 0 1px 2px rgba(10,31,68,0.04), 0 24px 48px -24px rgba(10,31,68,0.22) !important;
  }

  /* Density — compress / loosen padding on cards & main containers. */
  [data-divarc][data-density="compact"] article { padding-top: 14px !important; padding-bottom: 14px !important; }
  [data-divarc][data-density="comfy"] article { padding-top: 26px !important; padding-bottom: 26px !important; }

  /* Layout: 2-col masonry for desktop posts feed only. */
  [data-divarc][data-layout="2col"] [data-feed-list] {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 16px !important;
    align-items: start !important;
  }

  /* Dark theme: surgical overrides on the cream/paper/navy palette. */
  [data-divarc][data-theme="dark"] {
    --dvc-paper: #0A0F1F;
    --dvc-card: #142A55;
    --dvc-text: #FFF8E8;
    --dvc-text-muted: rgba(255,248,232,0.65);
    --dvc-line: rgba(244,185,66,0.18);
  }
  [data-divarc][data-theme="dark"] [style*="background: rgb(248, 249, 251)"],
  [data-divarc][data-theme="dark"] [style*="background:#F8F9FB"],
  [data-divarc][data-theme="dark"] [style*="background: rgb(241, 243, 248)"],
  [data-divarc][data-theme="dark"] [style*="background:#F1F3F8"] {
    background: #0A0F1F !important;
  }
  [data-divarc][data-theme="dark"] [style*="background: rgb(255, 255, 255)"],
  [data-divarc][data-theme="dark"] [style*="background:#fff"] {
    background: #142A55 !important;
  }
  [data-divarc][data-theme="dark"] [style*="background: rgb(255, 248, 232)"],
  [data-divarc][data-theme="dark"] [style*="background:#FFF8E8"] {
    background: rgba(244,185,66,0.12) !important;
  }
  [data-divarc][data-theme="dark"] [style*="color: rgb(10, 31, 68)"],
  [data-divarc][data-theme="dark"] [style*="color:#0A1F44"] {
    color: #FFF8E8 !important;
  }
  [data-divarc][data-theme="dark"] [style*="color: rgb(20, 42, 85)"],
  [data-divarc][data-theme="dark"] [style*="color:#142A55"] {
    color: #FFF8E8 !important;
  }
  [data-divarc][data-theme="dark"] [style*="color: rgb(42, 61, 107)"] {
    color: rgba(255,248,232,0.78) !important;
  }
  [data-divarc][data-theme="dark"] [style*="color: rgb(75, 91, 135)"] {
    color: rgba(255,248,232,0.65) !important;
  }
  [data-divarc][data-theme="dark"] [style*="color: rgb(134, 150, 176)"] {
    color: rgba(255,248,232,0.5) !important;
  }
  [data-divarc][data-theme="dark"] [style*="border-color: rgb(230, 233, 240)"],
  [data-divarc][data-theme="dark"] [style*="border:"][style*="rgb(230, 233, 240)"] {
    border-color: rgba(244,185,66,0.18) !important;
  }
</style>
</head>

<script type="text/babel">

              <div style={{ position: 'absolute', right: -40, top: -40, opacity: 0.3 }}>

              </div>
              <div style={{ marginTop: 48, position: 'relative' }}>
                <div style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#F4B942', fontWeight: 800 }}>Le brief</div>
                <h1 style={{ fontFamily: 'Instrument Serif, Georgia, serif', fontSize: 64, lineHeight: 1, fontWeight: 400, letterSpacing: '-0.025em', margin: '12px 0 18px' }}>
                  Le feed comme une <em style={{ fontStyle: 'italic', color: '#F4B942' }}>place de quartier</em>, pas un fil sans fin.
                </h1>
                <p style={{ fontSize: 17, lineHeight: 1.55, color: 'rgba(255,248,232,0.78)', maxWidth: 580, margin: 0 }}>

              </div>
              <div style={{ marginTop: 56, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, position: 'relative' }}>

                  <div style={{ display: 'flex', gap: 8 }}>
                    {[
                      { c: '#0A1F44', n: 'navy 950' },
                      { c: '#142A55', n: 'navy 900' },
                      { c: '#F4B942', n: 'gold 500' },
                      { c: '#B88A2A', n: 'gold 700' },
                      { c: '#FFF8E8', n: 'cream' },
                      { c: '#F8F9FB', n: 'paper' },

                      <div key={s.c} style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ height: 56, borderRadius: 10, background: s.c, border: s.c === '#FFF8E8' || s.c === '#F8F9FB' ? '1px solid rgba(255,248,232,0.18)' : 'none' }} />

                        <div style={{ fontSize: 9, opacity: 0.6 }}>{s.c}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#F4B942', fontWeight: 800, marginBottom: 12 }}>Typographie</div>
                  <div style={{ fontFamily: 'Instrument Serif, Georgia, serif', fontSize: 36, fontStyle: 'italic', lineHeight: 1, marginBottom: 4 }}>Instrument Serif</div>
                  <div style={{ fontSize: 11, opacity: 0.6, letterSpacing: '0.02em' }}>display · italic · pour les titres</div>
                  <div style={{ marginTop: 18, fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>Geist Sans 500/700</div>
                  <div style={{ fontSize: 11, opacity: 0.6 }}>UI · paragraphes · labels</div>
                </div>
              </div>
              <div style={{ marginTop: 56, position: 'relative', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>

                  { n: '01', t: 'Sage', d: 'Très fidèle au repo : composer compact, cards blanches, hiérarchie claire, micro-touches gold sur les accents.' },
                  { n: '02', t: 'Audacieux', d: 'Même palette, mais display Instrument Serif italique en titre, hero post pleine largeur, FAB et arc décoratif marqué.' },
                ].map(v => (
                  <div key={v.n} style={{ borderTop: '1px solid rgba(244,185,66,0.3)', paddingTop: 16 }}>
                    <div style={{ fontSize: 11, letterSpacing: '0.2em', color: '#F4B942', fontWeight: 800 }}>{v.n}</div>
                    <div style={{ fontFamily: 'Instrument Serif', fontSize: 28, fontStyle: 'italic', margin: '6px 0 8px' }}>{v.t}</div>
                    <div style={{ fontSize: 13, opacity: 0.78, lineHeight: 1.5 }}>{v.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="mobile-sage" title="Mobile · Sage" subtitle="Flow Feed → Story → Composer → Détail. Reste très proche du repo actuel : cards blanches, hiérarchie nette, micro-touches gold.">
          <DCArtboard id="m-sage-feed" label="01 · Feed (chrono)" width={390} height={844}>
            <PhoneFrame><window.SageFeedScreen /></PhoneFrame>
          </DCArtboard>
          <DCArtboard id="m-sage-story" label="02 · Story" width={390} height={844}>

          </DCArtboard>
          <DCArtboard id="m-sage-composer" label="03 · Nouveau post" width={390} height={844}>
            <PhoneFrame><window.SageComposerScreen /></PhoneFrame>

          <DCArtboard id="x-notifs" label="04 · Notifications" width={390} height={844}>
            <PhoneFrame><window.NotificationsScreen /></PhoneFrame>
          </DCArtboard>
          <DCArtboard id="x-search" label="05 · Recherche" width={390} height={844}>
            <PhoneFrame><window.SearchScreen /></PhoneFrame>

          <DCArtboard id="x-messages" label="06 · Discussions" width={390} height={844}>

          <DCArtboard id="x-chat" label="07 · Chat 1-1" width={390} height={844}>

          <DCArtboard id="x-settings" label="08 · Paramètres" width={390} height={844}>
            <PhoneFrame><window.SettingsScreen /></PhoneFrame>

        </DCSection>

        <DCSection id="marketplace" title="Marketplace" subtitle="Achète, vends, échange dans ton réseau de confiance. Mêmes tokens et grammaire que le feed.">

          </DCArtboard>
          <DCArtboard id="jb-detail" label="02 · Détail offre" width={390} height={844}>

          <DCArtboard id="em-feed" label="01 · Feed vide" width={390} height={844}>

  // Wait for all babel scripts to register globals — but cap the retries
  // so a single failed fetch doesn't block the whole canvas.
  let mountAttempts = 0;
  let mounted = false;
  const REQUIRED = [
    // sage + bold mobile
    'SageFeedScreen', 'SageStoryScreen', 'SageComposerScreen', 'SageDetailScreen',
    'BoldFeedScreen', 'BoldStoryScreen', 'BoldComposerScreen', 'BoldDetailScreen',
    // prototype + extra flow
    'MobilePrototype', 'OnboardingScreen', 'ProfileSelfScreen', 'ProfilePublicScreen',
    'NotificationsScreen', 'SearchScreen', 'MessagesListScreen', 'ChatScreen', 'SettingsScreen',
    // marketplace + jobs
    'MarketplaceListScreen', 'MarketplaceDetailScreen', 'MarketplaceFavoritesScreen',
    'JobsListScreen', 'JobsDetailScreen', 'JobsApplyScreen', 'JobsAppliedScreen', 'JobsMineScreen',
    // profile + create + wallet
    'ProfilePostsScreen', 'ProfileListingsScreen', 'ProfileAboutScreen',
    'CreateChooseScreen', 'CreateListingScreen', 'CreateJobScreen',
    'WalletHomeScreen', 'WalletHistoryScreen', 'WalletSaleScreen', 'WalletPayoutScreen',
    // admin + empty/error states
    'AdminDashboardScreen', 'AdminReportsScreen', 'AdminReviewScreen', 'AdminUsersScreen',
    'EmptyFeedScreen', 'EmptySearchScreen', 'OfflineScreen', 'NotFoundScreen', 'ServerErrorScreen',
    // stories + circles
    'StoriesCaptureScreen', 'StoriesEditScreen', 'StoriesViewerScreen', 'StoriesArchiveScreen',
    'OnboardWelcomeScreen', 'OnboardInterestsScreen', 'OnboardLocationScreen', 'OnboardConnectScreen', 'OnboardFirstPostScreen',
    'MapMainScreen', 'MapListSheetScreen', 'MapPinDetailScreen', 'MapFiltersScreen',
    'CirclesListScreen', 'CircleDetailScreen', 'CircleEventsScreen', 'CircleInviteScreen',
    // desktop + canvas + tweaks
    'DesktopFeedSage', 'DesktopFeedBold', 'DesignCanvas', 'DCSection', 'DCArtboard',
    'DivarcTweaksPanel', 'TweaksPanel',
  ];
  function ensurePlaceholders() {
    REQUIRED.forEach(name => {
      if (!window[name]) {
        window[name] = function MissingScreen() {
          return (
            <div style={{ padding: 24, fontFamily: 'Geist, system-ui', fontSize: 13, color: '#8993A8', background: '#F8F9FB', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', textAlign: 'center', border: '1px dashed #C8D2E5' }}>
              <div>
                <div style={{ fontFamily: 'Instrument Serif', fontStyle: 'italic', fontSize: 22, color: '#0A1F44' }}>{name}</div>
                <div style={{ marginTop: 6 }}>script non chargé</div>
              </div>
            </div>
          );
        };
      }
    });
  }
  function mount() {
    if (mounted) return;
    const missing = REQUIRED.filter(n => !window[n]);
    if (missing.length === 0 || mountAttempts > 80) {
      if (missing.length) {
        console.warn('[divarc] missing globals after timeout, rendering placeholders:', missing);
        ensurePlaceholders();
      }
      mounted = true;
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      return;
    }
    mountAttempts++;
    setTimeout(mount, 40);
  }
  mount();
</script>
